name: "Shared auto release"
on:
  workflow_call:
    inputs:
      prerelease:
        description: "Boolean indicating whether this release should be a prerelease"
        required: false
        default: false
        type: string
      publish:
        description: "Whether to publish a new release immediately"
        required: false
        default: false
        type: string
      llm-users:
        description: >
          JSON array of LLM/AI bot GitHub usernames whose PR authorship should be replaced
          with the PR's human assignee in the release notes.
          Example: '["github-copilot[bot]","devin-ai-integration[bot]"]'
          Glob patterns with '*' are supported for flexible matching.
          Defaults to a built-in list that includes GitHub Copilot and other common AI assistants.
        required: false
        default: ''
        type: string
      runs-on:
        description: "Overrides job runs-on setting (json-encoded list)"
        type: string
        required: false
        default: '["ubuntu-latest"]'
      summary-enabled:
        description: Enable github action summary.
        required: false
        default: true
        type: boolean
      environment:
        description: "Release environment that has secrets"
        type: string
        required: false
        default: 'release'

    outputs:
      id:
        description: The ID of the release that was created or updated.
        value: ${{ jobs.release.outputs.id }}
      name:
        description: The name of the release
        value: ${{ jobs.release.outputs.name }}
      tag_name:
        description: The name of the tag associated with the release.
        value: ${{ jobs.release.outputs.tag_name }}
      body:
        description: The body of the drafted release.
        value: ${{ jobs.release.outputs.body }}
      html_url:
        description: The URL users can navigate to in order to view the release
        value: ${{ jobs.release.outputs.html_url }}
      upload_url:
        description: The URL for uploading assets to the release, which could be used by GitHub Actions for additional uses, for example the @actions/upload-release-asset GitHub Action.
        value: ${{ jobs.release.outputs.upload_url }}
      major_version:
        description: The next major version number. For example, if the last tag or release was v1.2.3, the value would be v2.0.0.
        value: ${{ jobs.release.outputs.major_version }}
      minor_version:
        description: The next minor version number. For example, if the last tag or release was v1.2.3, the value would be v1.3.0.
        value: ${{ jobs.release.outputs.minor_version }}
      patch_version:
        description: The next patch version number. For example, if the last tag or release was v1.2.3, the value would be v1.2.4.
        value: ${{ jobs.release.outputs.patch_version }}
      resolved_version:
        description: The next resolved version number, based on GitHub labels.
        value: ${{ jobs.release.outputs.resolved_version }}
      exists:
        description: Tag exists so skip new release issue
        value: ${{ jobs.release.outputs.exists }}

permissions: {}

jobs:
  release:
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    environment: ${{ inputs.environment }}
    outputs:
      id: ${{ steps.drafter.outputs.id }}
      name: ${{ steps.drafter.outputs.name }}
      tag_name: ${{ steps.drafter.outputs.tag_name }}
      body: ${{ steps.drafter.outputs.body }}
      html_url: ${{ steps.drafter.outputs.html_url }}
      upload_url: ${{ steps.drafter.outputs.upload_url }}
      major_version: ${{ steps.drafter.outputs.major_version }}
      minor_version: ${{ steps.drafter.outputs.minor_version }}
      patch_version: ${{ steps.drafter.outputs.patch_version }}
      resolved_version: ${{ steps.drafter.outputs.resolved_version }}
      exists: ${{ steps.drafter.outputs.exists }}
      
    steps:
      - uses: actions/create-github-app-token@v1
        id: github-app
        with:
          app-id: ${{ vars.BOT_GITHUB_APP_ID }}
          private-key: ${{ secrets.BOT_GITHUB_APP_PRIVATE_KEY }}

      - name: Context
        id: context
        uses: cloudposse/github-action-yaml-config-query@0.1.4
        with:
          query: .${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}.${{ inputs.prerelease }}
          config: |-
            # Is default branch
            true:
              # Is prerelease (nightly builds)
              true:
                config: auto-pre-release.yml
                latest: false
              # Is regular release
              false:
                config: auto-release.yml
                latest: true
            # Is hotfix branch
            false:
              # Is prerelease (nightly builds)
              # pre releases from `non default` branch are `feature` releases
              true: 
                config: auto-feature-release.yml
                latest: false              
              # Is a regular release
              false:
                config: auto-release-hotfix.yml
                latest: false

      # Drafts your next Release notes as Pull Requests are merged into "main"
      - uses: cloudposse/github-action-auto-release@v4
        id: drafter
        with:
          token: ${{ steps.github-app.outputs.token }}
          publish: ${{ inputs.publish }}
          prerelease: ${{ inputs.prerelease }}
          latest: ${{ steps.context.outputs.latest }}
          summary-enabled: ${{ inputs.summary-enabled }}
          config-name: ${{ steps.context.outputs.config }}

      # When a PR was authored by an LLM/AI assistant, replace the bot username with the
      # PR's human assignee in the release notes so humans get proper credit.
      # The utility functions below mirror src/release-author-substitutor.js (unit-tested).
      - name: Substitute LLM authors in release notes
        if: ${{ steps.drafter.outputs.id != '' }}
        uses: actions/github-script@v7
        env:
          LLM_USERS: ${{ inputs.llm-users }}
        with:
          github-token: ${{ steps.github-app.outputs.token }}
          retries: 3
          script: |
            // Default list of LLM/AI assistant usernames.
            // Mirrors src/release-author-substitutor.js DEFAULT_LLM_USERS.
            const DEFAULT_LLM_USERS = [
              'github-copilot[bot]',
              'copilot',
              'devin-ai-integration[bot]',
              'amazon-q[bot]',
              'codeium[bot]',
            ];

            const llmUsersInput = process.env.LLM_USERS;
            const llmUsers = (llmUsersInput && llmUsersInput.trim())
              ? JSON.parse(llmUsersInput)
              : DEFAULT_LLM_USERS;

            function isLLMUser(username) {
              const norm = username.toLowerCase();
              return llmUsers.some(llmUser => {
                const nu = llmUser.toLowerCase();
                if (nu.includes('*')) {
                  const regexStr = nu.split('*').map(s => s.replace(/[.+?^${}()|[\]\\]/g, '\\$&')).join('.*');
                  return new RegExp(`^${regexStr}$`).test(norm);
                }
                return norm === nu;
              });
            }

            function extractPRReferences(body) {
              const prPattern = /@([a-zA-Z0-9_.\-[\]]+)\s+\(#(\d+)\)/g;
              const matches = [];
              let match;
              while ((match = prPattern.exec(body)) !== null) {
                // fullMatch is omitted here (unused); see src/release-author-substitutor.js for full shape
                matches.push({ author: match[1], prNumber: parseInt(match[2], 10) });
              }
              return matches;
            }

            function substituteLLMAuthors(body, prSubstitutions) {
              let updatedBody = body;
              for (const { prNumber, oldAuthor, newAuthor } of prSubstitutions) {
                const escapedAuthor = oldAuthor.replace(/[.+?^${}()|[\]\\]/g, '\\$&');
                const pattern = new RegExp(`@${escapedAuthor}(\\s+\\(#${prNumber}\\))`, 'g');
                updatedBody = updatedBody.replace(pattern, `@${newAuthor}$1`);
              }
              return updatedBody;
            }

            const releaseId = parseInt('${{ steps.drafter.outputs.id }}', 10);

            const { data: release } = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
            });

            const body = release.body || '';
            const prRefs = extractPRReferences(body);
            const llmPRRefs = prRefs.filter(ref => isLLMUser(ref.author));

            if (llmPRRefs.length === 0) {
              core.info('No LLM-authored PRs found in release notes');
              return;
            }

            const prSubstitutions = [];

            for (const prRef of llmPRRefs) {
              try {
                const { data: pr } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prRef.prNumber,
                });

                const humanAssignee = (pr.assignees || []).find(a => !isLLMUser(a.login));
                if (humanAssignee) {
                  prSubstitutions.push({
                    prNumber: prRef.prNumber,
                    oldAuthor: prRef.author,
                    newAuthor: humanAssignee.login,
                  });
                  core.info(`PR #${prRef.prNumber}: substituting @${prRef.author} with @${humanAssignee.login}`);
                } else {
                  core.info(`PR #${prRef.prNumber}: no human assignee found for @${prRef.author}, keeping original`);
                }
              } catch (error) {
                core.warning(`Failed to get assignees for PR #${prRef.prNumber}: ${error.message}`);
              }
            }

            if (prSubstitutions.length === 0) {
              core.info('No substitutions needed');
              return;
            }

            const updatedBody = substituteLLMAuthors(body, prSubstitutions);

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              body: updatedBody,
            });

            core.info(`Release notes updated: ${prSubstitutions.length} LLM author(s) replaced with human assignee(s)`);

