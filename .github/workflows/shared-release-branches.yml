name: "Shared release branches"

on:
  workflow_call:
    inputs:
      runs-on:
        description: "Overrides job runs-on setting (json-encoded list)"
        type: string
        required: false
        default: '["ubuntu-latest"]'

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  major-release-tagger:
    if: ${{ github.event.release.prerelease == false }}
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    environment: release
    steps:
      - uses: actions/create-github-app-token@v1
        id: github-app
        with:
          app-id: ${{ vars.BOT_GITHUB_APP_ID }}
          private-key: ${{ secrets.BOT_GITHUB_APP_PRIVATE_KEY }}

      - uses: cloudposse/github-action-major-release-tagger@v2
        with:
          token: ${{ steps.github-app.outputs.token }}

  release-branch-manager:
    if: ${{ github.event.release.prerelease == false }}
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    environment: release
    steps:
      - uses: actions/create-github-app-token@v1
        id: github-app
        with:
          app-id: ${{ vars.BOT_GITHUB_APP_ID }}
          private-key: ${{ secrets.BOT_GITHUB_APP_PRIVATE_KEY }}

      - uses: cloudposse/github-action-release-branch-manager@v2
        with:
          token: ${{ steps.github-app.outputs.token }}

  release-commenter:
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    steps:
      - name: Comment on released PRs
        uses: ./.github/actions/release-commenter
